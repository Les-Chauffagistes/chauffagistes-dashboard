name: build
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm ci --only=production

      - name: pack
        run: |
          TS=$(date -u +"%Y%m%dT%H%M%SZ")
          mkdir artifact
          tar -C . -czf artifact/myapp-${TS}.tar.gz \
            .next public package.json package-lock.json node_modules
          echo "TS=$TS" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: myapp-${{ env.TS }}
          path: artifact/myapp-${{ env.TS }}.tar.gz
