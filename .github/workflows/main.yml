name: build-and-release
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: [self-hosted, macOS]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Inject NEXT_PUBLIC
        run: |
          echo NEXT_PUBLIC_API_URL: https://chauffagistes-pool.fr:3000 > .env
          echo NEXT_PUBLIC_HISTORY_API_URL: http://192.168.1.201:8091 >> .env
          echo NEXT_PUBLIC_BASE_URL: https://stats.chauffagistes-pool.fr >> .env
        
      - run: npm ci
      - run: export DATABASE_URL="postgresql://user:pass@localhost:5432/db"
      - name: prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
        run: npx prisma generate

      - name: next build
        env: 
          SESSION_PASSWORD: 1234
        run: npm run build

      - name: Pack
        run: |
          TS=$(date -u +"%Y%m%dT%H%M%SZ")
          mkdir -p artifact
          tar -C . -czf artifact/stats.chauffagistes-${TS}.tar.gz \
            .next package.json package-lock.json public generated prisma
          echo "TS=$TS" >> $GITHUB_ENV

      - name: Push git tag
        env:
          GITHUB_PAT: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          # Setup credential helper pour utiliser le token
          git remote set-url origin https://github.com/Les-Chauffagistes/chauffagistes-dashboard.git
          git config credential.helper '!f() { echo "username=x-access-token"; echo "password=$GITHUB_PAT"; }; f'
      
          git tag v$TS
          git push origin v$TS

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: "v${{ env.TS }}"
          release_name: "Release ${{ env.TS }}"
          body: "Automated release ${{ env.TS }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v1
        with:
          files: artifact/stats.chauffagistes-${{ env.TS }}.tar.gz
          tag_name: v${{ env.TS }}
        env:
          GITHUB_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: notify-deploy
        run: |
          curl -X POST ${{ secrets.DEPLOY_URL }} \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_SECRET }}" \
            -d '{}'
