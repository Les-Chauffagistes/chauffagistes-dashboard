name: build
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: pack
        run: |
          TS=$(date -u +"%Y%m%dT%H%M%SZ")
          mkdir artifact
          tar -C . -czf artifact/stats.chauffagistes-${TS}.tar.gz \
            .next package.json package-lock.json
          echo "TS=$TS" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: stats.chauffagistes-${{ env.TS }}
          path: artifact/stats.chauffagistes-${{ env.TS }}.tar.gz
