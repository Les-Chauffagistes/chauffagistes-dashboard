name: build-and-release
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Pack
        run: |
          TS=$(date -u +"%Y%m%dT%H%M%SZ")
          mkdir -p artifact
          tar -C . -czf artifact/stats.chauffagistes-${TS}.tar.gz \
            .next package.json package-lock.json
          echo "TS=$TS" >> $GITHUB_ENV

      - name: Push git tag
        env:
          GITHUB_PAT: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          # Setup credential helper pour utiliser le token
          git remote set-url origin https://github.com/Les-Chauffagistes/chauffagistes-dashboard.git
          git config credential.helper '!f() { echo "username=x-access-token"; echo "password=$GITHUB_PAT"; }; f'
      
          git tag v$TS
          git push origin v$TS

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: "v${{ env.TS }}"
          release_name: "Release ${{ env.TS }}"
          body: "Automated release ${{ env.TS }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v1
        with:
          files: artifact/stats.chauffagistes-${{ env.TS }}.tar.gz
          tag_name: v${{ env.TS }}
        env:
          GITHUB_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
