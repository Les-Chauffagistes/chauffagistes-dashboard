name: Build & Publish Docker Image

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Inject NEXT_PUBLIC
      run: |
        echo NEXT_PUBLIC_API_URL: https://chauffagistes-pool.fr:3000 > .env
        echo NEXT_PUBLIC_HISTORY_API_URL: http://192.168.1.201:8091 >> .env
        echo NEXT_PUBLIC_BASE_URL: https://stats.chauffagistes-pool.fr >> .env

    - name: Build Docker image
      run: |
        docker build -t ghcr.io/les-chauffagistes/heatboard:${{ github.sha }} .

    - name: Push Docker image
      run: |
        docker push ghcr.io/les-chauffagistes/heatboard:${{ github.sha }}

    - name: tag latest
      if: github.ref == 'refs/heads/main'
      run: |
        docker tag ghcr.io/les-chauffagistes/heatboard:${{ github.sha }} ghcr.io/les-chauffagistes/heatboard:latest
        docker push ghcr.io/les-chauffagistes/heatboard:latest